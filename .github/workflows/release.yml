name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $content = Get-Content "CluadeX/CluadeX.csproj" -Raw
          $ver = [regex]::Match($content, '<Version>(\d+\.\d+\.\d+)</Version>').Groups[1].Value
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          echo "TAG=v$ver" >> $env:GITHUB_OUTPUT

      - name: Restore dependencies
        run: dotnet restore CluadeX.sln

      - name: Build Release
        run: dotnet build CluadeX.sln -c Release --no-restore --nologo

      - name: Publish
        run: dotnet publish CluadeX/CluadeX.csproj -c Release -r win-x64 --self-contained -o publish --nologo

      - name: Create zip
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath CluadeX-win-x64.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CluadeX-x64
          path: CluadeX-win-x64.zip

      - name: Create Release (on merge to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: CluadeX ${{ steps.version.outputs.TAG }}
          body: |
            ## CluadeX ${{ steps.version.outputs.TAG }}

            AI Coding Assistant by Xman Studio
            https://xman4289.com

            ### Download
            Download `CluadeX-win-x64.zip` below, extract, and run `CluadeX.exe`.

            ### Features
            - Beautiful Catppuccin Mocha dark theme with metallic UI
            - Multiple AI providers: Local GGUF, OpenAI, Anthropic Claude, Google Gemini, Ollama
            - Markdown rendering with syntax highlighting
            - SQLite chat persistence with full-text search
            - HuggingFace model downloads with progress
            - Git integration, code execution, file system tools
            - GPU auto-detection and optimization

            ### Requirements
            - Windows 10 1809+ (x64)
            - For local mode: [Ollama](https://ollama.com) or GGUF models
          files: CluadeX-win-x64.zip
          draft: false
          prerelease: false
          make_latest: true
